# fly.toml app configuration file generated for itpe-topic-splitter on 2026-04-09T01:35:27+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'itpe-topic-splitter'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = "requests"
    hard_limit = 2
    soft_limit = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/"

# OCR 대용량 PDF 처리를 위한 프록시 타임아웃 (5분)
[checks]
  [checks.alive]
    type = "tcp"
    port = 8080
    interval = "30s"
    timeout = "10s"

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
