<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITPE Topic Splitter</title>
<style>
  :root {
    --bg: #0f172a; --surface: #1e293b; --border: #334155;
    --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6;
    --accent-hover: #2563eb; --success: #22c55e; --error: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
  }
  .container { max-width: 520px; width: 100%; padding: 20px; }
  h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }

  /* Drop Zone */
  .dropzone {
    border: 2px dashed var(--border); border-radius: 12px;
    padding: 48px 24px; text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: var(--accent); background: rgba(59,130,246,0.05);
  }
  /* 자식 요소가 드래그 이벤트를 가로채지 않도록 — dropzone 하나가 모든 이벤트 받도록 */
  .dropzone > * { pointer-events: none; }
  .dropzone-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .dropzone-text { color: var(--muted); font-size: 0.9rem; }
  .dropzone-text strong { color: var(--accent); }
  .dropzone-hint { color: var(--muted); font-size: 0.75rem; margin-top: 8px; }

  /* File info */
  .file-info {
    display: none; margin-top: 16px; padding: 12px 16px;
    background: var(--surface); border-radius: 8px;
    font-size: 0.85rem; justify-content: space-between; align-items: center;
  }
  .file-info.show { display: flex; }
  .file-name { color: var(--text); font-weight: 500; }
  .file-size { color: var(--muted); }
  .file-remove {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 1.1rem; padding: 0 4px;
  }
  .file-remove:hover { color: var(--error); }

  /* Button */
  .btn {
    display: none; width: 100%; margin-top: 16px; padding: 12px;
    background: var(--accent); color: white; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.show { display: block; }

  /* Progress */
  .progress {
    display: none; margin-top: 16px;
  }
  .progress.show { display: block; }
  .progress-bar-bg {
    height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: var(--accent); border-radius: 3px;
    width: 0%; transition: width 0.3s;
  }
  .progress-text {
    color: var(--muted); font-size: 0.8rem; margin-top: 6px; text-align: center;
  }

  /* Result */
  .result {
    display: none; margin-top: 16px; padding: 16px;
    border-radius: 8px; font-size: 0.85rem;
  }
  .result.show { display: block; }
  .result.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
  .result.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .result-title { font-weight: 600; margin-bottom: 4px; }
  .result.success .result-title { color: var(--success); }
  .result.error .result-title { color: var(--error); }
  .result-detail { color: var(--muted); line-height: 1.5; }
  .result-warnings { color: var(--muted); font-size: 0.78rem; margin-top: 8px; font-style: italic; }

  /* Topics table */
  .topics-wrap { margin-top: 12px; max-height: 320px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 6px; }
  .topics-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .topics-table th, .topics-table td {
    padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border);
  }
  .topics-table thead th {
    position: sticky; top: 0; background: var(--surface);
    color: var(--muted); font-weight: 600; font-size: 0.72rem;
  }
  .topics-table td.num { color: var(--muted); width: 28px; }
  .topics-table td.session { color: var(--accent); font-weight: 600; width: 36px; }
  .topics-table td.qnum { color: var(--text); width: 44px; }
  .topics-table td.title { color: var(--text); }
  .topics-table td.pages { width: 80px; text-align: right; font-variant-numeric: tabular-nums; }
  .topics-table td.pages.warn { color: #f59e0b; font-weight: 600; }
  .topics-table td.pages.bad { color: var(--error); font-weight: 700; }
  .topics-summary { color: var(--muted); font-size: 0.78rem; margin-top: 8px; cursor: pointer; }
  .topics-summary::before { content: "▶ "; }
  .topics-summary.open::before { content: "▼ "; }
</style>
</head>
<body>
<div class="container">
  <h1>ITPE Topic Splitter</h1>
  <p class="subtitle">PDF를 업로드하면 토픽별로 분할하여 ZIP으로 다운로드합니다.</p>

  <div class="dropzone" id="dropzone">
    <div class="dropzone-icon">&#128196;</div>
    <div class="dropzone-text"><strong>클릭</strong> 또는 파일을 여기에 드래그</div>
    <div class="dropzone-hint">PDF 파일 (최대 50MB)</div>
  </div>
  <input type="file" id="fileInput" accept=".pdf" hidden>

  <div class="file-info" id="fileInfo">
    <div>
      <span class="file-name" id="fileName"></span>
      <span class="file-size" id="fileSize"></span>
    </div>
    <button class="file-remove" id="fileRemove">&times;</button>
  </div>

  <div class="engine-toggle" id="engineToggle">
    <label class="engine-label" title="모의고사(KPC/ITPE) 분할 시 토픽 제목 가독성을 높이는 실험 엔진. 분류 결과 자체는 fitz와 동일.">
      <input type="checkbox" id="kordocEngine">
      <span>모의고사 토픽 제목 보강 (kordoc, 실험)</span>
    </label>
  </div>

  <button class="btn" id="splitBtn">분할 시작</button>

  <div class="progress" id="progress">
    <div class="progress-bar-bg">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-text" id="progressText">파싱 중...</div>
  </div>

  <div class="result" id="result">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div class="result-warnings" id="resultWarnings"></div>
    <div class="topics-summary" id="topicsToggle" style="display:none">토픽 매핑 표 보기</div>
    <div class="topics-wrap" id="topicsWrap" style="display:none">
      <table class="topics-table">
        <thead>
          <tr><th>#</th><th>교시</th><th>번호</th><th>제목</th><th>페이지 (A)</th><th>B (PTS)</th></tr>
        </thead>
        <tbody id="topicsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const fileRemove = document.getElementById('fileRemove');
const splitBtn = document.getElementById('splitBtn');
const progress = document.getElementById('progress');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const result = document.getElementById('result');
const resultTitle = document.getElementById('resultTitle');
const resultDetail = document.getElementById('resultDetail');
const resultWarnings = document.getElementById('resultWarnings');
const topicsToggle = document.getElementById('topicsToggle');
const topicsWrap = document.getElementById('topicsWrap');
const topicsBody = document.getElementById('topicsBody');

// 교시별 정상 페이지 범위 (이 범위를 벗어나면 색상 강조)
function pageWarnClass(session, pages) {
  if (!pages) return '';
  if (session === 1) {
    // 1교시 단답형: 보통 1~3p
    if (pages > 4) return 'bad';
    if (pages > 3) return 'warn';
  } else if (session >= 2 && session <= 4) {
    // 2-4교시 서술형: 보통 3~6p
    if (pages > 8 || pages < 2) return 'bad';
    if (pages > 6 || pages < 3) return 'warn';
  }
  return '';
}

function renderTopics(topics, topicsB) {
  if (!topics || topics.length === 0) {
    topicsToggle.style.display = 'none';
    topicsWrap.style.display = 'none';
    return;
  }
  topicsBody.innerHTML = '';

  // B 인덱스: (session, num) → topicB 매핑
  const bMap = new Map();
  (topicsB || []).forEach(b => {
    bMap.set(`${b.session}-${b.num}`, b);
  });

  topics.forEach((t, i) => {
    const tr = document.createElement('tr');
    const sess = t.session ? `M${t.session}` : '-';
    const num = t.num ? `Q${String(t.num).padStart(2,'0')}` : '-';
    const pageStr = t.pages
      ? `${t.pages}p (${t.page_start}-${t.page_end})`
      : '-';
    const warn = pageWarnClass(t.session, t.pages);

    // B 비교
    const b = bMap.get(`${t.session}-${t.num}`);
    let bCell = '';
    let bClass = '';
    if (!topicsB || topicsB.length === 0) {
      bCell = '<span style="color:#64748b">—</span>';
    } else if (!b) {
      bCell = '<span style="color:#ef4444">없음</span>';
      bClass = 'bad';
    } else if (b.page_start === t.page_start && b.page_end === t.page_end) {
      bCell = '<span style="color:#22c55e">✓ 일치</span>';
    } else {
      bCell = `<span style="color:#f59e0b">${b.pages}p (${b.page_start}-${b.page_end})</span>`;
      bClass = 'warn';
    }

    tr.innerHTML = `
      <td class="num">${i + 1}</td>
      <td class="session">${sess}</td>
      <td class="qnum">${num}</td>
      <td class="title">${escapeHtml(t.title || '')}</td>
      <td class="pages ${warn}">${pageStr}</td>
      <td class="pages ${bClass}">${bCell}</td>
    `;
    topicsBody.appendChild(tr);
  });
  topicsToggle.style.display = 'block';
  topicsWrap.style.display = 'block';
  topicsToggle.classList.add('open');
  const bExtra = (topicsB && topicsB.length) ? ` / B ${topicsB.length}건` : '';
  topicsToggle.textContent = `토픽 매핑 표 접기 (A ${topics.length}건${bExtra})`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

topicsToggle.addEventListener('click', () => {
  const open = topicsWrap.style.display !== 'none';
  topicsWrap.style.display = open ? 'none' : 'block';
  topicsToggle.classList.toggle('open', !open);
  const baseLabel = topicsToggle.textContent.replace(/^.*?\s*\(/, '토픽 매핑 표 ' + (open ? '보기' : '접기') + ' (');
  topicsToggle.textContent = baseLabel;
});

let selectedFile = null;

// --- Drag & Drop ---
console.log('[splitter] drop-fix v4 loaded');

// 페이지 어디에 떨어져도 브라우저가 PDF를 열어버리지 않도록 전역 차단
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
  window.addEventListener(ev, e => {
    e.preventDefault();
    e.stopPropagation();
    if (ev === 'drop') console.log('[splitter] window drop captured', e.target);
  });
});

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('dragover');
  const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
  console.log('[splitter] dropzone drop', f && f.name, f && f.type);
  if (f && f.name.toLowerCase().endsWith('.pdf')) selectFile(f);
  else console.warn('[splitter] dropped file rejected (not .pdf)', f);
});
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) selectFile(fileInput.files[0]);
});
fileRemove.addEventListener('click', clearFile);

function selectFile(f) {
  selectedFile = f;
  fileName.textContent = f.name;
  fileSize.textContent = ` (${(f.size / 1024 / 1024).toFixed(1)}MB)`;
  fileInfo.classList.add('show');
  splitBtn.classList.add('show');
  result.classList.remove('show');
}

function clearFile() {
  selectedFile = null;
  fileInput.value = '';
  fileInfo.classList.remove('show');
  splitBtn.classList.remove('show');
  result.classList.remove('show');
  progress.classList.remove('show');
}

// --- Split (비동기 Job 폴링) ---
splitBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  splitBtn.disabled = true;
  progress.classList.add('show');
  result.classList.remove('show');
  progressBar.style.width = '5%';
  progressText.textContent = '업로드 중...';

  const form = new FormData();
  form.append('file', selectedFile);

  try {
    // 1) 업로드 → job_id 수신 (모의고사 엔진 옵트인 query)
    const useKordoc = document.getElementById('kordocEngine')?.checked;
    const uploadUrl = useKordoc ? '/api/split?mock_engine=kordoc' : '/api/split';
    const uploadResp = await fetch(uploadUrl, { method: 'POST', body: form });
    if (!uploadResp.ok) {
      const err = await uploadResp.json().catch(() => ({ detail: uploadResp.statusText }));
      throw new Error(err.detail || '업로드 실패');
    }
    const { job_id } = await uploadResp.json();
    progressBar.style.width = '15%';
    progressText.textContent = '처리 시작...';

    // 2) 상태 폴링 (2초 간격)
    const statusData = await new Promise((resolve, reject) => {
      const poll = setInterval(async () => {
        try {
          const sr = await fetch(`/api/status/${job_id}`);
          if (!sr.ok) { clearInterval(poll); reject(new Error('상태 조회 실패')); return; }
          const data = await sr.json();

          // 진행 상태 UI 업데이트
          progressText.textContent = data.progress || '처리 중...';
          if (data.progress?.includes('파싱')) progressBar.style.width = '30%';
          else if (data.progress?.includes('경계') || data.progress?.includes('탐지')) progressBar.style.width = '50%';
          else if (data.progress?.includes('분할')) progressBar.style.width = '70%';
          else if (data.progress?.includes('완료')) progressBar.style.width = '90%';

          if (data.status === 'done') {
            clearInterval(poll);
            resolve(data);
          } else if (data.status === 'error') {
            clearInterval(poll);
            reject(new Error(data.error || '알 수 없는 오류'));
          }
        } catch (e) {
          clearInterval(poll);
          reject(e);
        }
      }, 2000);
    });

    // 3) 완료 → ZIP 다운로드
    progressBar.style.width = '95%';
    progressText.textContent = '다운로드 중...';

    const dlResp = await fetch(`/api/download/${job_id}`);
    if (!dlResp.ok) throw new Error('다운로드 실패');

    const blob = await dlResp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = selectedFile.name.replace('.pdf', '_split.zip');
    a.click();
    URL.revokeObjectURL(url);

    progressBar.style.width = '100%';
    progressText.textContent = '완료!';

    result.className = 'result show success';
    resultTitle.textContent = '분할 완료';
    const pagesStr = statusData.total_pages
      ? `${statusData.topic_count}개 토픽 탐지 (총 ${statusData.total_pages}페이지)`
      : `${statusData.topic_count}개 토픽 탐지`;
    const qrStr = statusData.quality_report
      ? `\n${statusData.quality_report}`
      : '';
    resultDetail.textContent = pagesStr + qrStr;
    resultDetail.style.whiteSpace = 'pre-wrap';
    resultWarnings.textContent = statusData.warnings ? `참고: ${statusData.warnings}` : '';
    renderTopics(statusData.topics, statusData.topics_b);

  } catch (e) {
    progressBar.style.width = '100%';
    progressBar.style.background = 'var(--error)';
    progressText.textContent = '실패';

    result.className = 'result show error';
    resultTitle.textContent = '분할 실패';
    resultDetail.textContent = e.message;
    resultWarnings.textContent = '';
  }

  splitBtn.disabled = false;
  setTimeout(() => {
    progressBar.style.background = '';
  }, 2000);
});
</script>
</body>
</html>
